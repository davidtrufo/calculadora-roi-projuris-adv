<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Eficiência e ROI | Projuris ADV</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #0b1120; 
  --surface: #111827; 
  --card: #1f2937; 
  --border: #374151; 
  --accent: #2563eb; 
  --accent2: #10b981; 
  --green: #10b981; 
  --yellow: #f59e0b;
  --red: #ef4444; 
  --purple: #0ea5e9; 
  --orange: #f97316; 
  --text: #f3f4f6; 
  --muted: #9ca3af;
}
body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
header {
  background: linear-gradient(135deg, #0b1120 0%, #064e3b 100%); 
  border-bottom: 1px solid var(--border);
  padding: 14px 26px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { 
  width: 34px; height: 34px; 
  background: linear-gradient(135deg, var(--accent), var(--accent2)); 
  border-radius: 8px; display: flex; align-items: center; justify-content: center; 
  color: #fff;
}
.logo-text h1 { font-size: 15px; font-weight: 700; }
.logo-text p { font-size: 10px; color: var(--muted); }
.live-badge { background: var(--accent); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.main { padding: 18px 26px; max-width: 1440px; margin: 0 auto; }
.input-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 20px; margin-bottom: 18px; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 14px; }
.input-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 4px; }
.field label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
input[type="number"] {
  width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); padding: 9px 12px; font-size: 15px; font-weight: 700; font-family: inherit; outline: none; transition: border-color 0.2s;
}
input[type="number"]:focus { border-color: var(--accent2); }

.results { display: none; }
.results.visible { display: block; animation: fadeIn 0.3s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.status-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; position: relative; overflow: hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card.blue::before { background: var(--accent); }
.stat-card.purple::before { background: var(--purple); }
.stat-card.green::before { background: var(--green); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.red::before { background: var(--red); }
.stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.stat-val { font-size: 16px; font-weight: 800; line-height: 1.3; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.3; }

.na-bar {
  background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(37,99,235,0.1));
  border: 1px solid rgba(16,185,129,0.35); border-radius: 11px; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 16px;
}
.na-left { flex: 1; }
.na-tag { display: inline-block; background: var(--accent2); color: #fff; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.na-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--accent2); }
.na-detail { font-size: 12px; color: #e2e8f0; line-height: 1.6; }
.na-right { flex-shrink: 0; text-align: right;}
.na-multiplier { font-size: 28px; font-weight: 900; color: #fff; line-height: 1; }
.na-multiplier-lbl { font-size: 10px; text-transform: uppercase; color: var(--accent2); font-weight: 700; letter-spacing: 0.5px; margin-top: 4px; }

/* 3-col grid */
.tri { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.bot { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.ph { display: flex; align-items: center; gap: 8px; margin-bottom: 13px; padding-bottom: 11px; border-bottom: 1px solid var(--border); }
.pi { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.pt { font-size: 13px; font-weight: 700; }
.ps { font-size: 10px; color: var(--muted); }

/* SCRIPT HERO */
.script-hero { background: linear-gradient(135deg, rgba(37,99,235,0.07), rgba(16,185,129,0.07)); border: 1px solid rgba(16,185,129,0.38); border-radius: 12px; padding: 18px; }
.sh-header { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
.sh-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; color:#fff;}
.sh-title { font-size: 14px; font-weight: 800; }
.sh-sub { font-size: 10px; color: var(--muted); }
.s-body { font-size: 12.5px; line-height: 1.78; color: #f3f4f6; background: var(--card); border-radius: 8px; padding: 13px 15px; border-left: 3px solid var(--accent2); margin-bottom: 10px;}
.s-note { font-size: 10.5px; color: var(--muted); padding-top: 9px; border-top: 1px solid var(--border); }
.highlight-text { color: var(--accent2); font-weight: 700; }
.highlight-text-red { color: var(--red); font-weight: 700; }

/* LISTS */
.data-list { list-style: none; }
.data-list li { background: var(--card); border-radius: 7px; padding: 10px 12px; margin-bottom: 8px; font-size: 12px; line-height: 1.5; border-left: 3px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.data-list li.red-item { border-left-color: var(--red); }
.data-list li.green-item { border-left-color: var(--green); }
.data-list li.blue-item { border-left-color: var(--accent); }
.data-label { color: var(--muted); font-weight: 600; }
.data-value { font-weight: 800; font-size: 13px; }

/* STEPS */
.steps { list-style: none; }
.steps li { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; font-size: 12px; line-height: 1.5; }
.steps li:last-child { border-bottom: none; }
.sn { width: 22px; height: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; color: var(--accent2); }
.st strong { color: #fff; display: block; font-size: 11px; margin-bottom: 2px; }

/* ALERTS */
.sig { padding: 9px 12px; border-radius: 7px; font-size: 11px; margin-bottom: 6px; line-height: 1.5; }
.sig.ok { background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.28); }
.sig.warn { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.28); }

@media (max-width: 1100px) {
  .tri { grid-template-columns: 1fr; }
  .bot { grid-template-columns: 1fr; }
  .status-bar { grid-template-columns: repeat(3,1fr); }
  .input-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  .status-bar { grid-template-columns: 1fr 1fr; }
  .main { padding: 12px; }
  header { padding: 12px 14px; }
  .input-grid { grid-template-columns: 1fr; }
  .na-bar { flex-direction: column; align-items: flex-start; }
  .na-right { text-align: left; margin-top: 10px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 3H14C17.3137 3 20 5.68629 20 9C20 12.3137 17.3137 15 14 15H7V21" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Projuris ADV - Calculadora de Eficiência e ROI</h1>
      <p>Projeção Financeira e Análise Operacional</p>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div> MODO APRESENTAÇÃO</div>
</header>

<div class="main">
  <div class="input-panel">
    <div class="section-label">📊 Parâmetros Operacionais do Escritório</div>
    <div class="input-grid">
      <div class="field">
        <label>Colaboradores Produtivos</label>
        <input type="number" id="colab" placeholder="Ex: 5" min="1" oninput="calculate()">
      </div>
      <div class="field">
        <label>Horas operacionais/sem (por pessoa)</label>
        <input type="number" id="horas" placeholder="Ex: 10" min="1" oninput="calculate()">
      </div>
      <div class="field">
        <label>Valor Médio da Hora (R$)</label>
        <input type="number" id="valorHora" placeholder="Ex: 150" min="1" oninput="calculate()">
      </div>
      <div class="field">
        <label>Investimento Projuris (R$/mês)</label>
        <input type="number" id="invest" placeholder="Ex: 399" min="1" oninput="calculate()">
      </div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="status-bar" id="statusBar"></div>
    <div id="nextBar"></div>
    <div class="tri" id="triGrid"></div>
    <div class="bot" id="botGrid"></div>
  </div>
</div>

<script>
// Premissa conservadora: O sistema corta 35% do tempo gasto com tarefas operacionais.
const EFICIENCIA = 0.35; 

function formatCurrency(value) {
  return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatNumber(value) {
  return value.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function calculate() {
  const colab = parseFloat(document.getElementById('colab').value);
  const horasSemana = parseFloat(document.getElementById('horas').value);
  const valorHora = parseFloat(document.getElementById('valorHora').value);
  const invest = parseFloat(document.getElementById('invest').value);

  // Só exibe se todos os campos tiverem valores válidos maiores que 0
  if (!colab || !horasSemana || !valorHora || !invest || colab <= 0 || horasSemana <= 0 || valorHora <= 0 || invest <= 0) {
    document.getElementById('results').className = 'results';
    return;
  }

  // Cálculos Base
  const horasMesEquipe = colab * horasSemana * 4; // 4 semanas
  const custoProblemaMes = horasMesEquipe * valorHora;
  const custoInercia6Meses = custoProblemaMes * 6;

  // Cálculos de Solução (Projuris)
  const horasSalvasMes = horasMesEquipe * EFICIENCIA;
  const economiaMes = horasSalvasMes * valorHora;
  const economiaAno = economiaMes * 12;

  // Cálculos Financeiros (ROI)
  const lucroLiquidoMes = economiaMes - invest;
  const roiPercent = ((economiaMes - invest) / invest) * 100;
  const multiplo = (economiaMes / invest).toFixed(1);

  render(
    horasMesEquipe, custoProblemaMes, custoInercia6Meses, 
    horasSalvasMes, economiaMes, economiaAno, 
    roiPercent, multiplo, lucroLiquidoMes, invest, valorHora
  );
}

function render(horasMesEquipe, custoProblemaMes, custoInercia6Meses, horasSalvasMes, economiaMes, economiaAno, roiPercent, multiplo, lucroLiquidoMes, invest, valorHora) {
  
  // 1. STATUS BAR (KPIs)
  document.getElementById('statusBar').innerHTML = `
    <div class="stat-card red"><div class="stat-label">Esforço Operacional</div><div class="stat-val" style="color:var(--red)">${formatNumber(horasMesEquipe)}h</div><div class="stat-sub">alocadas/mês</div></div>
    <div class="stat-card yellow"><div class="stat-label">Custo Operacional Atual</div><div class="stat-val" style="color:var(--yellow)">${formatCurrency(custoProblemaMes)}</div><div class="stat-sub">custo invisível /mês</div></div>
    <div class="stat-card green"><div class="stat-label">Economia Gerada (35%)</div><div class="stat-val" style="color:var(--green)">${formatCurrency(economiaMes)}</div><div class="stat-sub">recursos recuperados /mês</div></div>
    <div class="stat-card blue"><div class="stat-label">Lucro Anual Gerado</div><div class="stat-val" style="color:var(--accent)">${formatCurrency(economiaAno)}</div><div class="stat-sub">adição ao caixa</div></div>
    <div class="stat-card purple"><div class="stat-label">ROI Estimado</div><div class="stat-val" style="color:var(--purple)">${formatNumber(roiPercent)}%</div><div class="stat-sub">retorno sobre capital</div></div>
  `;

  // 2. HIGHLIGHT BAR (Impacto)
  document.getElementById('nextBar').innerHTML = `
    <div class="na-bar">
      <div class="na-left">
        <div class="na-tag">SÍNTESE DA ANÁLISE</div>
        <div class="na-title">Custo Operacional Estimado vs. Retorno Projetado</div>
        <div class="na-detail">A manutenção do cenário vigente representa um custo operacional invisível de <strong>${formatCurrency(custoInercia6Meses)}</strong> em apenas 6 meses.<br>Com a implementação tecnológica, para cada R$ 1,00 investido na plataforma, estima-se um retorno operacional equivalente a <strong>R$ ${multiplo}</strong>.</div>
      </div>
      <div class="na-right">
        <div class="na-multiplier">${multiplo}x</div>
        <div class="na-multiplier-lbl">Fator de Retorno</div>
      </div>
    </div>
  `;

  // 3. TRI GRID (Cenários e Resumo)
  document.getElementById('triGrid').innerHTML = `
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(239,68,68,0.16)">📊</div><div><div class="pt">Custo Operacional Atual</div><div class="ps">Estimativa de perdas invisíveis</div></div></div>
      <ul class="data-list">
        <li class="red-item"><span class="data-label">Valor estimado da hora</span><span class="data-value">${formatCurrency(valorHora)}</span></li>
        <li class="red-item"><span class="data-label">Tempo não-faturável/mês</span><span class="data-value">${formatNumber(horasMesEquipe)} horas</span></li>
        <li class="red-item"><span class="data-label">Custo operacional/mês</span><span class="data-value" style="color:var(--red)">${formatCurrency(custoProblemaMes)}</span></li>
      </ul>
      <div class="s-note">Nota: O esforço direcional em tarefas manuais gera um passivo contínuo para a operação do escritório.</div>
    </div>

    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(16,185,129,0.16)">📈</div><div><div class="pt">Projeção de Otimização</div><div class="ps">Redirecionamento de recursos</div></div></div>
      <ul class="data-list">
        <li class="green-item"><span class="data-label">Tempo otimizado/mês</span><span class="data-value">${formatNumber(horasSalvasMes)} horas</span></li>
      </ul>
      <div style="font-size: 11px; line-height: 1.6; margin-top: 10px; color: #cbd5e1;">
        <strong>Cenário A (Expansão):</strong> Redirecionar as ${formatNumber(horasSalvasMes)}h recuperadas para atendimento ativo, captação de clientes e fechamento de novos honorários.<br><br>
        <strong>Cenário B (Sustentabilidade):</strong> Eliminar ${formatNumber(horasSalvasMes)}h de carga de trabalho excedente, promovendo conformidade e qualidade na entrega jurídica.
      </div>
    </div>

    <div class="script-hero">
      <div class="sh-header"><div class="sh-icon">💡</div><div><div class="sh-title">Resumo Executivo (ROI)</div><div class="sh-sub">Visão clara do impacto financeiro</div></div></div>
      <div class="s-body">
        A equipe atual aloca cerca de <span class="highlight-text-red">${formatNumber(horasMesEquipe)} horas por mês</span> em controles manuais e de rotina. Considerando o valor médio de mercado, isso representa um custo invisível de <span class="highlight-text-red">${formatCurrency(custoProblemaMes)}</span> mensais.<br><br>
        A adoção do Projuris ADV propõe substituir esta despesa operacional rotineira por um investimento direto de ${formatCurrency(invest)}, gerando uma devolução imediata de <span class="highlight-text">${formatNumber(horasSalvasMes)} horas operacionais livres</span> para a banca.<br><br>
        <strong>Conclusão Analítica:</strong> A modernização sistêmica torna-se um ativo gerador de margem de lucro, com custo de aquisição consideravelmente inferior ao passivo operacional atual.
      </div>
    </div>
  `;

  // 4. BOT GRID (Guia e Alertas - Adaptado para o Cliente)
  let alertaHtml = "";
  if(roiPercent > 2000) {
    alertaHtml += `<div class="sig ok">⭐ <strong>ROI Excepcional (${formatNumber(roiPercent)}%):</strong> O cenário indica uma assimetria altamente favorável. A substituição do modelo manual trará impacto drástico na rentabilidade e no volume de entregas.</div>`;
  } else if (roiPercent < 100) {
    alertaHtml += `<div class="sig ok">📌 <strong>Eficiência e Conformidade:</strong> Neste cenário, além da equivalência financeira, a plataforma agrega alto valor tangível em segurança da informação (compliance) e eliminação de riscos de perda de prazos.</div>`;
  } else {
    alertaHtml += `<div class="sig ok">✅ <strong>Cenário Validado:</strong> A relação custo-benefício atesta alta viabilidade financeira. A proporção entre investimento e ganho operacional justifica a adoção sistêmica a curto prazo.</div>`;
  }

  document.getElementById('botGrid').innerHTML = `
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(37,99,235,0.16)">🧭</div><div><div class="pt">Plano de Implementação e Validação</div><div class="ps">Etapas sugeridas para a parceria</div></div></div>
      <ol class="steps">
        <li><div class="sn">1</div><div class="st"><strong>Validação do Cenário</strong>Confirmação do dimensionamento da equipe e da carga horária média alocada em gestão manual.</div></li>
        <li><div class="sn">2</div><div class="st"><strong>Cálculo de Impacto</strong>Mapeamento financeiro atrelando o tempo produtivo ao custo operacional vigente.</div></li>
        <li><div class="sn">3</div><div class="st"><strong>Projeção de Eficiência</strong>Estimativa tecnológica com meta conservadora de redução de 35% na carga operacional.</div></li>
        <li><div class="sn">4</div><div class="st"><strong>Viabilidade de Investimento</strong>Avaliação direta entre a supressão do custo rotineiro e a previsibilidade de mensalidade do software.</div></li>
      </ol>
    </div>
    
    <div class="panel">
      <div class="ph"><div class="pi" style="background:rgba(14,165,233,0.16)">🔎</div><div><div class="pt">Análise de Cenário</div><div class="ps">Considerações sobre a projeção atual</div></div></div>
      ${alertaHtml}
      <div class="sig ok" style="background: rgba(37,99,235,0.1); border-color: rgba(37,99,235,0.28);">
        💡 <strong>Nota Técnica:</strong> A premissa de devolução de 35% do tempo é uma estimativa padronizada para escritórios em fase inicial de automação. Operações com engajamento sistêmico maduro relatam índices historicamente superiores.
      </div>
    </div>
  `;

  document.getElementById('results').className = 'results visible';
}
</script>
</body>
</html>
